appId: com.cogpit.app
productName: Cogpit
copyright: "Copyright © 2026 Gentrit Biba"

publish:
  provider: github
  owner: gentritbiba
  repo: cogpit

directories:
  output: release
  buildResources: build

asar: true
asarUnpack:
  - packages/cogpit-memory/dist/**/*
compression: maximum

files:
  - out/**/*
  - packages/cogpit-memory/dist/**/*
  - "!out/**/*.map"
  - "!node_modules/**/*.{md,map,ts,d.ts}"
  - "!node_modules/**/{CHANGELOG,README,LICENSE,LICENCE,readme,changelog}*"
  - "!node_modules/**/{test,tests,__tests__,spec,specs,example,examples,docs}/**"
  # Renderer-only packages (already bundled into out/renderer/) — exclude from asar
  - "!node_modules/shiki/**"
  - "!node_modules/@shikijs/**"
  - "!node_modules/lucide-react/**"
  - "!node_modules/@radix-ui/**"
  - "!node_modules/react-markdown/**"
  - "!node_modules/react-resizable-panels/**"
  - "!node_modules/@tanstack/**"
  - "!node_modules/class-variance-authority/**"
  - "!node_modules/tailwind-merge/**"
  - "!node_modules/remark-gfm/**"
  - "!node_modules/whisper-web-transcriber/**"

extraMetadata:
  main: out/main/main.js

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: pacman
      arch:
        - x64
  category: Development

pacman:
  depends:
    - c-ares
    - gcc-libs
    - glibc
    - gtk3
    - libcups
    - libdrm
    - libnotify
    - libxcrypt-compat
    - libxss
    - mesa
    - nss
    - alsa-lib
